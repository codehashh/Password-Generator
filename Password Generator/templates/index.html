<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secure Password Generator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #2563eb
    );
}

.card{
    width:500px;
    max-width:90%;
    padding:35px;
    border-radius:25px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
    0 8px 32px rgba(0,0,0,.3);

    color:white;
}

.title{
    text-align:center;
    margin-bottom:25px;
}

.title h1{
    font-size:2rem;
}

.title p{
    color:#cbd5e1;
}

.password-box{
    display:flex;
    margin:20px 0;
}

.password-box input{
    flex:1;
    padding:15px;
    border:none;
    border-radius:12px 0 0 12px;
    background:#0f172a;
    color:white;
    font-size:16px;
}

.copy-btn{
    width:60px;
    border:none;
    cursor:pointer;
    background:#3b82f6;
    color:white;
    border-radius:0 12px 12px 0;
}

.slider{
    width:100%;
}

.option{
    display:flex;
    justify-content:space-between;
    margin:15px 0;
}

.generate{
    width:100%;
    padding:15px;
    margin-top:20px;

    border:none;
    border-radius:12px;

    background:linear-gradient(
    90deg,
    #2563eb,
    #7c3aed
    );

    color:white;
    font-size:16px;
    font-weight:600;

    cursor:pointer;
    transition:.3s;
}

.generate:hover{
    transform:translateY(-3px);
}

.strength{
    margin-top:20px;
}

.bar{
    width:100%;
    height:12px;
    background:#334155;
    border-radius:20px;
    overflow:hidden;
}

.fill{
    height:100%;
    width:0%;
    border-radius:20px;
    transition:.4s;
}

.label{
    margin-top:8px;
    font-weight:500;
}

</style>
</head>
<body>

<div class="card">

    <div class="title">
        <h1>🔐 Password Generator</h1>
        <p>Create secure passwords instantly</p>
    </div>

    <form method="POST">

        <label>Password Length:
            <span id="lengthValue">12</span>
        </label>

        <input
        type="range"
        min="6"
        max="50"
        value="12"
        class="slider"
        id="slider"
        name="length">
       
        <div class="option">
            <span>Uppercase Letters</span>
            <input type="checkbox" name="uppercase" checked>
        </div>

        <div class="option">
            <span>Lowercase Letters</span>
            <input type="checkbox" name="lowercase" checked>
        </div>

        <div class="option">
            <span>Numbers</span>
            <input type="checkbox" name="numbers" checked>
        </div>

        <div class="option">
            <span>Symbols</span>
            <input type="checkbox" name="symbols" checked>
        </div>

        <button class="generate">
            Generate Password
        </button>

    </form>

    {% if password %}

    <div class="password-box">
        <input
        type="text"
        value="{{password}}"
        id="password"
        readonly>

        <button
        class="copy-btn"
        onclick="copyPassword()">
        📋
        </button>
    </div>

    <div class="strength">

        <div class="bar">
            <div
            class="fill"
            style="
            width:
            {% if strength=='Weak' %}25%
            {% elif strength=='Medium' %}50%
            {% elif strength=='Strong' %}75%
            {% else %}100%
            {% endif %};

            background:
            {% if strength=='Weak' %}#ef4444
            {% elif strength=='Medium' %}#f59e0b
            {% elif strength=='Strong' %}#22c55e
            {% else %}#16a34a
            {% endif %};
            ">
            </div>
        </div>

        <div class="label">
            Strength: {{strength}}
        </div>

    </div>

    {% endif %}

</div>

<script>

const slider =
document.getElementById("slider");

const value =
document.getElementById("lengthValue");

slider.oninput = () =>{
    value.innerText = slider.value;
};

function copyPassword(){

    navigator.clipboard.writeText(
    document.getElementById("password").value
    );

    alert("Password Copied!");
}

</script>

</body>
</html>
